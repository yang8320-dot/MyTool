name: MyTool

on:
  workflow_dispatch:

# 【修正】強制 GitHub Actions 使用最新的 Node.js 24 執行環境，消除過時警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 取得最新程式碼
      uses: actions/checkout@v4

    - name: 2. 安裝 .NET 8.0 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 3. 還原 NuGet 套件
      run: dotnet restore MiniProgram01/MyTool.csproj

    - name: 4. 編譯真正的程式到 Library 資料夾
      run: >
        dotnet publish MiniProgram01/MyTool.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=false
        -o ./publish_output/Library

    - name: 5. 自動生成極速啟動器 (Launcher)
      run: |
        mkdir Launcher
        
        echo '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><OutputType>WinExe</OutputType><TargetFramework>net472</TargetFramework><AssemblyName>MyTool</AssemblyName></PropertyGroup></Project>' > Launcher/Launcher.csproj
        
        echo 'using System.Diagnostics; using System.IO; using System.Reflection; class Program { static void Main(string[] args) { string baseDir = Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location); string target = Path.Combine(baseDir, "Library", "MyTool.exe"); if (File.Exists(target)) { ProcessStartInfo info = new ProcessStartInfo { FileName = target, WorkingDirectory = Path.Combine(baseDir, "Library"), Arguments = string.Join(" ", args) }; Process.Start(info); } } }' > Launcher/Program.cs
        
        dotnet build Launcher/Launcher.csproj -c Release -o ./publish_output

    - name: 6. 刪除啟動器產生時的多餘檔案 (保持根目錄乾淨)
      run: |
        del ./publish_output/MyTool.exe.config
        del ./publish_output/MyTool.pdb

    - name: 7. 將發布檔案壓縮成 ZIP
      run: Compress-Archive -Path ./publish_output/* -DestinationPath MyTool_Release_Clean.zip

    - name: 8. 上傳 ZIP 讓您可以下載
      uses: actions/upload-artifact@v4
      with:
        name: MyTool-Clean-Artifact
        path: MyTool_Release_Clean.zip
        retention-days: 30
